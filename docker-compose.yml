services:
  postgres:
    image: postgres:17
    container_name: dataprocessor-postgres
    environment:
      POSTGRES_DB: dataprocessor
      POSTGRES_USER: dataprocessor
      POSTGRES_PASSWORD: dataprocessor
    ports:
      - "5432:5432"
    volumes:
      - dataprocessor-postgres-data:/var/lib/postgresql/data

volumes:
  dataprocessor-postgres-data: